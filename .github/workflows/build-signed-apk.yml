name: 🚀 Build Signed Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: 🔨 Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. جلب الكود
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ✅ 2. تثبيت JDK 17
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ 3. تثبيت Flutter
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      # ✅ 4. تحميل الـ Dependencies
      - name: 📦 Get Dependencies
        run: flutter pub get

      # ✅ 5. فك تشفير الـ Keystore من Base64
      - name: 🔐 Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      # ✅ 6. بناء الـ APK الموقّع
      - name: 🔨 Build Signed Release APK
        run: flutter build apk --release
        env:
          SIGNING_STORE_FILE: keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ✅ 7. رفع الـ APK كـ Artifact
      - name: 📤 Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ✅ 8. حذف الـ Keystore بعد البناء
      - name: 🧹 Clean up Keystore
        if: always()
        run: rm -f android/app/keystore.jks